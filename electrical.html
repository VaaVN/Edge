<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ГРАНЬ | Испытание №2</title>

    <link rel="stylesheet" href="css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="electrical-page">
    <div class="background-grid"></div>
    <div class="background-noise"></div>

    <header>
      <div class="logo">
        <h2>ГРАНЬ</h2>
      </div>

      <div class="desk-status">Испытание №2 · Электропитание комплекса</div>
    </header>

    <main class="electricalContainer">
      <span class="memory-label"> ПРОТОКОЛ Δ-02 </span>

      <h1>Восстановление питания</h1>

      <p>Соедините каждый энергетический канал с соответствующим терминалом.</p>

      <div id="taskText">Подключено: 0 / 4</div>

      <div id="electricalBoard">
        <!-- Левая сторона -->

        <div class="leftColumn">
          <div class="connector left" data-id="0"></div>

          <div class="connector left" data-id="1"></div>

          <div class="connector left" data-id="2"></div>

          <div class="connector left" data-id="3"></div>
        </div>

        <!-- Линии -->

        <svg id="wireCanvas"></svg>

        <!-- Правая сторона -->

        <div class="rightColumn">
          <div class="connector right" data-id="0"></div>

          <div class="connector right" data-id="1"></div>

          <div class="connector right" data-id="2"></div>

          <div class="connector right" data-id="3"></div>
        </div>
      </div>
    </main>

    <!-- Победа -->

    <div id="successModal">
      <div class="modal-window">
        <span class="modal-label"> Испытание завершено </span>

        <h2>Питание восстановлено</h2>

        <p>
          Основной шлюз карманного измерения снова доступен.

          <br /><br />

          Теперь вы можете войти внутрь.
        </p>

        <button id="continueButton">Войти в карманное измерение</button>
      </div>
    </div>

    <audio id="connectSound">
      <source src="assets/audio/bip.mp3" />
    </audio>

    <audio id="successSound">
      <source src="assets/audio/succes.mp3" />
    </audio>

    <audio id="errorSound">
      <source src="assets/audio/error.mp3" />
    </audio>

    <script src="js/electrical.js"></script>
  </body>
</html>
